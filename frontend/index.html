<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Flavor Haven Recipes</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
	<style>
		:root {
			--bg: #fff8ef;
			--surface: #fffdf8;
			--ink: #2d2017;
			--accent: #d96d30;
			--accent-2: #ffb347;
			--border: #f2d9c6;
			--shadow: 0 12px 28px rgba(91, 50, 22, 0.14);
			--radius: 18px;
		}

		* {
			box-sizing: border-box;
			margin: 0;
			padding: 0;
		}

		body {
			min-height: 100vh;
			font-family: "Manrope", sans-serif;
			color: var(--ink);
			background:
				radial-gradient(circle at 15% 20%, #ffd7ab 0%, transparent 35%),
				radial-gradient(circle at 80% 10%, #ffe8c8 0%, transparent 30%),
				linear-gradient(135deg, #fff8ef 0%, #fff2df 55%, #ffe9d2 100%);
			padding: 2rem 1rem 3rem;
		}

		.container {
			width: min(1120px, 100%);
			margin: 0 auto;
		}

		.hero {
			background: var(--surface);
			border: 1px solid var(--border);
			border-radius: calc(var(--radius) + 6px);
			box-shadow: var(--shadow);
			padding: clamp(1.2rem, 4vw, 2rem);
			display: flex;
			align-items: center;  
			justify-content: space-between;
			gap: 1rem;
			animation: rise 650ms ease-out both;
		}

		.hero h1 {
			font-family: "Playfair Display", serif;
			font-size: clamp(1.6rem, 4vw, 2.7rem);
			letter-spacing: 0.4px;
			line-height: 1.15;
		}

		.controls {
			display: flex;
			align-items: center;
			gap: 1rem;
		}

		.category-picker {
			display: flex;
			align-items: center;
			gap: 0.6rem;
			background: #fff3e0;
			border: 1px solid #f0c7a7;
			border-radius: 999px;
			padding: 0.45rem 0.9rem;
		}

		#recipeSearch {
			font: inherit;
			color: var(--ink);
			border: 1px solid #f0c7a7;
			background: #fff3e0;
			padding: 0.65rem 0.9rem;
			border-radius: 10px;
			outline: none;
			transition: border-color 180ms ease;
		}

		#recipeSearch::placeholder {
			color: #a68968;
		}

		#recipeSearch:focus {
			border-color: var(--accent);
		}

		.category-picker label {
			font-size: 0.92rem;
			font-weight: 700;
			white-space: nowrap;
		}

		.category-picker select {
			font: inherit;
			color: var(--ink);
			border: none;
			background: transparent;
			font-weight: 600;
			min-width: 10rem;
			outline: none;
			cursor: pointer;
		}

		.recipes {
			margin-top: 1.8rem;
			display: grid;
			grid-template-columns: repeat(4, minmax(0, 1fr));
			gap: 1rem;
		}

		.recipe-card {
			background: var(--surface);
			border: 1px solid var(--border);
			border-radius: var(--radius);
			overflow: hidden;
			box-shadow: 0 8px 20px rgba(115, 62, 32, 0.1);
			display: flex;
			flex-direction: column;
			transform: translateY(14px);
			opacity: 0;
			animation: rise 520ms ease-out forwards;
		}

		.recipe-card:nth-child(2) { animation-delay: 70ms; }
		.recipe-card:nth-child(3) { animation-delay: 140ms; }
		.recipe-card:nth-child(4) { animation-delay: 210ms; }
		.recipe-card:nth-child(5) { animation-delay: 280ms; }
		.recipe-card:nth-child(6) { animation-delay: 350ms; }
		.recipe-card:nth-child(7) { animation-delay: 420ms; }
		.recipe-card:nth-child(8) { animation-delay: 490ms; }

		.recipe-card img {
			width: 100%;
			aspect-ratio: 4 / 3;
			object-fit: cover;
		}

		.card-body {
			padding: 0.95rem;
			display: flex;
			flex-direction: column;
			gap: 0.9rem;
			flex-grow: 1;
		}

		.card-body h3 {
			font-size: 1.05rem;
			line-height: 1.3;
		}

		.view-btn {
			margin-top: auto;
			border: none;
			border-radius: 10px;
			padding: 0.65rem 0.9rem;
			font: inherit;
			font-weight: 700;
			color: #fff;
			background: linear-gradient(120deg, var(--accent), var(--accent-2));
			cursor: pointer;
			transition: transform 180ms ease, box-shadow 180ms ease;
		}

		.view-btn:hover {
			transform: translateY(-2px);
			box-shadow: 0 8px 18px rgba(217, 109, 48, 0.35);
		}

		.nav-btn {
			display: inline-flex;
			align-items: center;
			justify-content: center;
			text-decoration: none;
			white-space: nowrap;
			border-radius: 10px;
			padding: 0.65rem 0.95rem;
			font-weight: 700;
			color: #fff;
			background: linear-gradient(120deg, var(--accent), var(--accent-2));
			transition: transform 180ms ease, box-shadow 180ms ease;
		}

		.nav-btn:hover {
			transform: translateY(-2px);
			box-shadow: 0 8px 18px rgba(217, 109, 48, 0.35);
		}

		.no-results {
			grid-column: 1 / -1;
			text-align: center;
			padding: 1.2rem;
			background: #fff3e0;
			border: 1px dashed #ebb48e;
			border-radius: 12px;
			font-weight: 600;
		}

		.modal {
			position: fixed;
			inset: 0;
			display: grid;
			place-items: center;
			padding: 1rem;
			background: rgba(24, 14, 8, 0.5);
			opacity: 0;
			visibility: hidden;
			transition: opacity 200ms ease, visibility 200ms ease;
			z-index: 50;
		}

		.modal.show {
			opacity: 1;
			visibility: visible;
		}

		.modal-content {
			width: min(640px, 100%);
			background: var(--surface);
			border: 1px solid var(--border);
			border-radius: var(--radius);
			padding: 1.2rem;
			box-shadow: var(--shadow);
		}

		.modal-header {
			display: flex;
			justify-content: space-between;
			align-items: center;
			gap: 1rem;
			margin-bottom: 0.8rem;
		}

		.modal-title {
			font-family: "Playfair Display", serif;
			font-size: 1.5rem;
		}

		.close-modal {
			border: none;
			background: #ffe8d1;
			color: #4a2a18;
			font-size: 1.1rem;
			font-weight: 700;
			width: 2rem;
			height: 2rem;
			border-radius: 999px;
			cursor: pointer;
		}

		.modal h4 {
			margin-bottom: 0.45rem;
		}

		.ingredients-list {
			margin: 0 0 0.9rem 1.1rem;
		}

		.instructions {
			line-height: 1.55;
		}


		@keyframes rise {
			from {
				opacity: 0;
				transform: translateY(16px);
			}
			to {
				opacity: 1;
				transform: translateY(0);
			}
		}

		@media (max-width: 980px) {
			.recipes {
				grid-template-columns: repeat(2, minmax(0, 1fr));
			}

			.hero {
				flex-direction: column;
				align-items: stretch;
			}

			.controls {
				flex-wrap: wrap;
			}
		}

		@media (max-width: 560px) {
			body {
				padding: 1rem 0.75rem 2rem;
			}

			.recipes {
				grid-template-columns: 1fr;
			}

			.category-picker {
				width: 100%;
				justify-content: space-between;
			}

			.category-picker select {
				min-width: 8.5rem;
			}

			.nav-btn {
				width: 100%;
			}
		}
	</style>
</head>
<body>
	<div class="container">
		<header class="hero">
			<h1>Janu’s Culinary Collection</h1>
			<div class="controls">
				<div class="category-picker">
					<label for="category">Category</label>
					<select id="category" name="category">
						<option value="All">All</option>
						<option>Breakfast</option>
						<option>Lunch</option>
						<option>Dinner</option>
						<option>Dessert</option>
						<option>Baking</option>
						<option>Frying</option>
						<option>Sweet</option>
						<option>Spicy</option>
					</select>
				</div>
				<input type="text" id="recipeSearch" placeholder="Search by name or ingredients...">
				<a class="nav-btn" href="add_recipe.html">Add New Recipe</a>
			</div>
		</header>

		<main class="recipes" id="recipesGrid" aria-label="Recipe cards"></main>
	</div>

	<div class="modal" id="recipeModal" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
		<div class="modal-content">
			<div class="modal-header">
				<h2 class="modal-title" id="modalTitle">Recipe details</h2>
				<button class="close-modal" id="closeModal" type="button" aria-label="Close recipe details">x</button>
			</div>
			<h4>Ingredients</h4>
			<ul class="ingredients-list" id="modalIngredients"></ul>
			<h4>Instructions</h4>
			<p class="instructions" id="modalInstructions"></p>
		</div>
	</div>
	<script src="script.js"></script>
</body>
</html>
